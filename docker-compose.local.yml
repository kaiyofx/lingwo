  #     - prod-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_NAME}"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 5s

  redis-lingwo:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - prod-network

  geo-check-lingwo:
    build:
      context: ./geo-check
    restart: unless-stopped
    environment:
      GEO_ALLOWED_COUNTRIES: ${GEO_ALLOWED_COUNTRIES:-RU}
      GEO_ALLOW_UNKNOWN: ${GEO_ALLOW_UNKNOWN:-0}
    networks:
      - prod-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.geo-ru.forwardauth.address=http://geo-check-lingwo:8080"
      - "traefik.http.middlewares.geo-ru.forwardauth.trustForwardHeader=true"

  qdrant-lingwo:
    image: qdrant/qdrant
    restart: unless-stopped
    volumes:
      - qdrant-storage:/qdrant/storage
    networks:
      - prod-network

  qdrant-init-lingwo:
    build:
      context: ./qdrant
    depends_on:
      qdrant-lingwo:
        condition: service_started
    restart: "no"
    networks:
      - prod-network
    environment:
      QDRANT_HOST: qdrant-lingwo
      QDRANT_PORT: 6333
    volumes:
      - ./qdrant/all_themes.txt:/qdrant_updater/all_themes.txt

  api-lingwo:
    build:
      context: ./api
    restart: unless-stopped
    ports:
      - 8001:8001
    depends_on:
      # pg-lingwo:
      #   condition: service_healthy
      redis-lingwo:
        condition: service_healthy
      qdrant-init-lingwo:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql+asyncpg://${PG_USER}:${PG_PASSWORD_ENCODE}@${PG_HOST}:${PG_PORT}/${PG_NAME}"
      LLAMA_MODEL_PATH: /host_data
      REDIS_HOST: redis-lingwo
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QDRANT_HOST: qdrant-lingwo
      QDRANT_PORT: 6333
      CLASSIFIED_THEMES_PATH: /app/api/classified_themes.json
    volumes:
      - ./qdrant/all_themes.txt:/app/qdrant/all_themes.txt
      - ..:/host_data
    networks:
      - prod-network

  frontend-lingwo:
    build:
      context: ./lingwo
    restart: unless-stopped
    ports:
      - 3000:3000
    depends_on:
      qdrant-init-lingwo:
        condition: service_completed_successfully
    environment:
      NUXT_AUTH_URL: ${NUXT_AUTH_URL:-http://auth-lingwo:8000}
      NUXT_PUBLIC_BASE_URL: ${NUXT_PUBLIC_BASE_URL:-http://localhost:3000}
      NUXT_PUBLIC_BASE_AUTH: ${NUXT_PUBLIC_BASE_AUTH:-http://localhost:8000/api/auth}
      NUXT_PUBLIC_BASE_API_URL: ${NUXT_PUBLIC_BASE_API_URL:-http://localhost:8001}
      NUXT_PUBLIC_DOMAIN: ${NUXT_PUBLIC_DOMAIN:-localhost}
      NUXT_PUBLIC_FULL_DOMAIN: ${NUXT_PUBLIC_FULL_DOMAIN:-http://localhost:3000}
      NUXT_BACKEND_SERVICE: ${NUXT_BACKEND_SERVICE:-http://api-lingwo:8001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    networks:
      - prod-network

  auth-lingwo:
    image: lingwo_auth
    tty: true
    stdin_open: true
    restart: unless-stopped
    ports:
      - 8000:8000
    build:
      context: ./auth
    depends_on:
      # pg-lingwo:
      #   condition: service_healthy
      redis-lingwo:
        condition: service_healthy
    networks:
      - prod-network
    environment:
      OTP_TIMEOUT: 5
      REG_TOKEN_TIMEOUT: 10
      ACCESS_TOKEN_LIFETIME: 720
      REFRESH_TOKEN_LIFETIME: 365
      PEPPERED_PASSWORDS_SECRET_KEY: "18629634036cf6865346zab7936c8189e5f6047cd3abdbb2cf8eb1956bc6bc387"
      DJANGO_SETTINGS_MODULE: auth_service.settings
      SECRET_KEY: ${AUTHSECRET_KEY}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_PORT: ${EMAIL_HOST_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      SIGNING_KEY: ${SIGNING_KEY}
      VERIFYING_KEY: ${VERIFYING_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis-lingwo
      REDIS_PORT: "6379"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-lingwo:6379/0
      DB_NAME: ${PG_NAME}
      DB_USER: ${PG_USER}
      DB_PASSWORD: ${PG_PASSWORD}
      DB_HOST: ${PG_HOST}
      DB_PORT: ${PG_PORT}
      TZ: ${TZ}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://auth-lingwo:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  prod-network:
    external: false
    name: prod-network

volumes:
  qdrant-storage: